name: Pull Request

on: [pull_request]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: |
            functions/package-lock.json
            hosting/package-lock.json
      - name: Lint functions
        run: |
          cd functions
          npm install
          npm run lint
      - name: Lint hosting
        run: |
          cd hosting
          npm install
          npm run lint