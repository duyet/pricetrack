name: Deploy Functions

on:
  push:
    branches:
      - master
    paths: ['functions/**']
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: 'functions/package-lock.json'
      - name: Run Eslint
        run: |
          cd functions
          npm install
          npm run lint
      - name: Deploy functions
        run: |
          cd functions
          npm install
          export FIREBASE_TOKEN=${{ secrets.FIREBASE_TOKEN }}
          npm run deploy